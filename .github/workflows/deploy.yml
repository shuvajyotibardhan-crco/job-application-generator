name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_APP_CHECK_KEY: ${{ secrets.VITE_FIREBASE_APP_CHECK_KEY }}

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Write functions .env
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > functions/.env
          echo "GOOGLE_SEARCH_API_KEY=${{ secrets.GOOGLE_SEARCH_API_KEY }}" >> functions/.env
          echo "GOOGLE_SEARCH_ENGINE_ID=${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}" >> functions/.env

      - name: Deploy to Firebase (hosting, functions, rules)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          npm install -g firebase-tools

          # Deploy hosting separately so we can handle the "already active version" no-op gracefully
          firebase deploy --only hosting --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --force 2>&1 | tee /tmp/hosting.log
          HOSTING_EXIT=${PIPESTATUS[0]}
          if [ $HOSTING_EXIT -ne 0 ]; then
            if grep -q "is the current active version" /tmp/hosting.log; then
              echo "Hosting: content already live — no changes needed"
            else
              echo "Hosting deploy failed:" && cat /tmp/hosting.log && exit 1
            fi
          fi

          # Deploy functions, Firestore rules, and Storage rules
          firebase deploy --only functions,firestore:rules,storage --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
